<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>singleRoute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/inicio.css">
    <link rel="stylesheet" href="styles/styles_barra.css">
    <link rel="stylesheet" href="styles/Aventuras_proximas.css">
    <link rel="stylesheet" href="styles/styleformularioemergente.css">
    <script defer src="js/i18n.js"></script>
    <script src="/ARCY-PRUEBAS/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css">
    <style>
    .botones
    {
        display: flex;
        justify-content: space-between;
        position: fixed; /* or position: absolute; */
        bottom: 0;
        width: 100%;
        background-color: #ffffffb9; /* Add background color if needed */
        padding: 8px; /* Add padding if needed */
        box-shadow: 0px -2px 5px rgba(0, 0, 0, 0.1); /* Add box shadow if needed */
    }

    .create-adventure-link {
    background-color: #D57275; /* Color de fondo del enlace */
    color: white; /* Color del texto */
    padding: 10px 30px; /* Espaciado interno del enlace */
    text-align: center; /* Alinea el texto en el centro */
    text-decoration: none; /* Elimina el subrayado del texto */
    display: inline-block; /* Hace que el enlace sea un bloque en línea */
    font-size: 16px; /* Tamaño del texto */
    margin: 4px 2px; /* Margen alrededor del enlace */
    cursor: pointer; /* Cambia el cursor a una mano cuando se pasa sobre el enlace */
    border: none; /* Elimina el borde del enlace */
    border-radius: 5px; /* Bordes redondeados */
    transition-duration: 0.4s; /* Duración de la transición al cambiar de estilo */
    font-weight: bold;
    }

    .general-info{
        background-color: #ffffffb9;
        display: flex;
        justify-content: space-between;

    }
    
    .cont-ginfo{
        display: flex;
        flex-direction: column;
    }
    
    .inserted-ginfo{
        margin-left: 4px;
        overflow: hidden; 
        white-space: normal; 
        word-wrap: break-word; 
    }
    
    .header-o-ginfo{
        display: flex;
        align-items: center;
        p{
            margin-top: 4px;
        }
    }

    .scrollable-section{
    font-size: 22px; /* Tamaño deseado para cada sección */
    white-space: nowrap;
    overflow-x: hidden;
    width: 75%;
    cursor: pointer; /* Cambia el cursor para indicar que el elemento es interactivo */
}

.scrollable-section:hover{
    overflow-x: overlay; /* Permite el desplazamiento horizontal */
}

.scrollable-section::-webkit-scrollbar {
    height: 5px; /* Altura de la barra de desplazamiento */
    background: transparent; /* Fondo transparente */
}

.scrollable-section::-webkit-scrollbar-thumb {
    background: #888; /* Color del deslizador de la barra de desplazamiento */
    border-radius: 10px; /* Bordes redondeados del deslizador */
}

.scrollable-section::-webkit-scrollbar-thumb:hover {
    background: #555; /* Color al pasar el cursor sobre el deslizador */
}
    </style>
</head>
<body>
    <header>
        <div class="navbar" >
            <span id="openBtn" class="btn-icon" onclick="openNav()" >&#9776;</span> 

            <img src="./assets/icons/Logo.PNG" class="img-nav" alt="Logo" id="logoImage">
            <div class="containerlanguages">
                <!-- Selector de idioma -->
                <div class="lang-switcher">
                    <label for="lang-select" data-i18n="label_select_lang">Idioma:</label>
                    <select id="lang-select">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="it">Italiano</option>
                        <option value="fr">Frances</option>
                    </select>
                </div>
            </div>
            <!-- Boton trigger de Lupa -->
            <button type="button" id="btnTriggerSB" class="btn-icon" onclick="window.location.href='/museums'">
                <img src="assets/icons/regresar.png" alt="Buscar" class="img-nav">
            </button>
            
        </div>

        <div class="container-modal-sidebar" id="modalSidebar">
            <div id="sidebar" class="sidebar">
                <div class="user">
                    <p data-i18n="greeting_hello">Hola, </p><b id="nombreUsuario"> NOMBRE </b> 
                </div>
                <div class="sidebar-text">
                    <a href="/museums" class="btn-sidebar"> 
                        <img src="./assets/icons/museum_icon_white.png" class="sidebar-img"> <span data-i18n="museums">Museos</span>
                    </a>
                    <a href="/aventuras_proximas" class="btn-sidebar"> 
                        <img src="./assets/icons/itinerarioIcono.png" class="sidebar-img"> <span data-i18n="visit_plans">Planes de Visita</span>
                    </a>
                    <a href="/MisFavoritos" class="btn-sidebar"> 
                        <img src="./assets/icons/favoritosBlancoRosa.png" class="sidebar-img"> <span data-i18n="favorite_museums">Museos favoritos</span>
                    </a>
                    <a href="/MisVisitados" class="btn-sidebar"> 
                        <img src="./assets/icons/checked.png" class="sidebar-img"> <span data-i18n="visited_museums">Museos Visitados</span>
                    </a>
                    
                </div>

                <div class="sidebar-text" style="margin-top: auto;">
                    <a href="/perfilTurista" class="btn-sidebar"> 
                        <img src="./assets/icons/engraneIcon.png" class="sidebar-img"> <span data-i18n="account">Cuenta</span>
                    </a>
                    <a href="#" class="btn-sidebar" id="cerrarSesion"> 
                        <img src="./assets/icons/cerrarIcono.png" class="sidebar-img"> <span data-i18n="logout">Cerrar Sesión </span>
                    </a>
                </div>
                <button type="button" id="closeBtn" class="closeBtn btn-icon" onclick="closeNav()">&times;</a>
            </div>
        </div>  
    </header>

    <main> 
        <div class="general-info">
            <div class="cont-ginfo scrollable-section">
                <div class="header-o-ginfo">
                    <img src="./assets/icons/reloj3.png" width="24px" height="24px">
                    <span class="scrollable-section"><b data-i18n="duration">Duración: </b><span id="length"> Calculando Ruta... </span></span>
                    </div>
            </div>

            <div class="cont-ginfo scrollable-section">
                <div class="header-o-ginfo">
                    <img src="./assets/icons/origenIcon.png" width="24px" height="24px">
                    <span class="scrollable-section"><b data-i18n="origin">Origen: </b><span id="nombreLugarOrigen"> Sin Origen especificado. </span></span>
                     </div>
            </div>

            <div class="cont-ginfo scrollable-section">
                <div class="header-o-ginfo">
                    <img src="./assets/icons/origenIcon.png" width="24px" height="24px">
                    <span class="scrollable-section"><b data-i18n="destination">Destino: </b><span id="nombreLugar"> Sin Origen especificado. </span></span>
                    </div>
            </div>
        </div>
        
        <div id="auxPlaces" style="display: none;"></div>
        <div id="map" ></div>
        <div class="botones">
            <div class="Boton" style="margin: 4px 0 0 4px;">
                <button type="button" class="create-adventure-link" id="btnOmitir" data-i18n="button_cancel">Cancelar</button>
            </div>
            <div class="boton" style="margin: 4px 0 0 4px;">
                <button type="button" class="create-adventure-link" id="btnLlegar" data-i18n="button_arrived">He llegado</button>
            </div>
        </div>
 
    </main>
    
    
    
    <script src="js/singleRoute.js"></script>
    
    <script type="module" src="js/jquery-3.7.1.min.js"></script>
