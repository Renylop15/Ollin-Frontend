<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="museums">Listado de Museos</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/stylesMuseums.css">
    <link rel="stylesheet" href="styles/stylesfav.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css">
    <style>
        .scrollbar-hide {
        scrollbar-width: none; /* Firefox */
        }

        .scrollbar-hide::-webkit-scrollbar {
        width: 0;
        height: 0;
        }

        /* Mostrar scrollbar solo al hacer hover */
        .hover\\:scrollbar-default:hover {
        scrollbar-width: auto; /* Firefox */
        }

        .hover\\:scrollbar-default:hover::-webkit-scrollbar {
        width: 8px;
        height: 8px;
        }

        .hover\\:scrollbar-default:hover::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 4px;
        }

        .hover\\:scrollbar-default:hover::-webkit-scrollbar-track {
        background-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div id="app" class="flex h-screen">

    <!-- SIDEBAR ADMIN -->
        <aside id="sidebar" class="w-20 bg-black text-white flex flex-col items-center py-4 justify-between">
            <div class="space-y-6">
                <div id="logo" class="w-12 h-12 bg-white rounded-lg"></div>

                <!-- Menu -->
                <div class="flex flex-col items-center space-y-6 mt-10">
                    <a href="/museosAdmin" class="btn-sidebar"> 
                        <span data-i18n="museums">Museos</span>
                    </a>

                     <a href="/gestionUsers" class="btn-sidebar"> 
                        <span>Usuarios</span>
                    </a>
                    <button id="btn-calendar">📅</button>
                    <a href="/cuentaAdmin" class="btn-sidebar"> 
                        <span>Cuenta</span>
                    </a>
                </div>
            </div>

            <div class="containerlanguages">
                <!-- Selector de idioma -->
                <div class="lang-switcher">
                    <label for="lang-select" data-i18n="label_select_lang">Idioma:</label>
                    <select id="lang-select">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="it">Italiano</option>
                        <option value="fr">Frances</option>
                    </select>
                </div>
            </div>
        </aside>

    <!-- MAIN -->
        <main class="min-w-md max-w-full flexitems-center mx-auto px-4 py-8
        scroll-smooth scrollbar-thin scrollbar-thumb-red-700 scrollbar-track-red-900 scrollbar-hide hover:scrollbar-default"> 
            <h1 class="titleAP" data-i18n="museums_list">Museos</h1>

        <!-- TITLE -->
            <h1 class="text-2xl font-bold mb-4">Gestión de Museos</h1>

        <!-- BUSCADOR -->
            <div class="museums-controls flex items-center justify-between mb-4">
                <div class="search-box">
                    <input type="text" placeholder="Buscar" id="searchMuseoInput"  placeholder="Buscar museo por nombre...">
                    <img src="assets/icons/lupaGoogl.png" id="search-box">
                    <img src="assets/icons/filtroIcono.png" alt="Filter" id="filter-icon">
                </div>
            </div>

        <!-- FILTROS -->
            <div id="filters-expanded" class="filters-expanded">
                <div id="contenedorMamalonFiltros">
                    <div>
                        <b>Alcaldía</b>
                        <div id="recommendedFilters">
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-ao" data-alcaldia="Álvaro Obregón"> 
                                <label for="alcaldia-ao">Álvaro Obregón</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-azc" data-alcaldia="Azcapotzalco"> 
                                <label for="alcaldia-azc">Azcapotzalco</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-bj" data-alcaldia="Benito Juarez"> 
                                <label for="alcaldia-bj">Benito Juárez</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-coy" data-alcaldia="Coyoacán"> 
                                <label for="alcaldia-coy">Coyoacán</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-cm" data-alcaldia="Cuajimalpa de Morelos"> 
                                <label for="alcaldia-cm">Cuajimalpa de Morelos</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-cua" data-alcaldia="Cuauhtémoc"> 
                                <label for="alcaldia-cua">Cuauhtémoc</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-gam" data-alcaldia="Gustavo A. Madero"> 
                                <label for="alcaldia-gam">Gustavo A. Madero</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-izt" data-alcaldia="Iztacalco"> 
                                <label for="alcaldia-izt">Iztacalco</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-iztapa" data-alcaldia="Iztapalapa"> 
                                <label for="alcaldia-iztapa">Iztapalapa</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-mh" data-alcaldia="Miguel Hidalgo"> 
                                <label for="alcaldia-mh">Miguel Hidalgo</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-ma" data-alcaldia="Milpa Alta"> 
                                <label for="alcaldia-ma">Milpa Alta</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-tl" data-alcaldia="Tláhuac"> 
                                <label for="alcaldia-tl">Tláhuac</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-tlal" data-alcaldia="Tlalpan"> 
                                <label for="alcaldia-tlal">Tlalpan</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-vc" data-alcaldia="Venustiano Carranza"> 
                                <label for="alcaldia-vc">Venustiano Carranza</label>
                            </div>
                            <div>
                                <input type="checkbox" class="alcaldia-checkbox checkbox-button" id="alcaldia-xoc" data-alcaldia="Xochimilco"> 
                                <label for="alcaldia-xoc">Xochimilco</label>
                            </div>
                        </div>

                        <div>
                            <b data-i18n="more_filters">Filtros avanzados</b>
                            <div id="moreFilters">

                            <div>
                                <input type="checkbox" id="filterAlwaysFree" class="checkbox-button">
                                <label for="filterAlwaysFree">Siempre gratis</label>
                            </div>

                            <div>
                                <input type="checkbox" id="filterHasServices" class="checkbox-button">
                                <label for="filterHasServices">Tienen servicios</label>
                            </div>

                            <div>
                                <input type="checkbox" id="filterHasDiscounts" class="checkbox-button">
                                <label for="filterHasDiscounts">Cuenta con descuentos</label>
                            </div>

                            <div>
                                <input type="checkbox" id="filter-abierto-ahora" class="checkbox-button">
                                <label for="filter-abierto-ahora">Abiertos ahora</label>
                            </div>

                            <div>
                                <input type="checkbox" id="filter-abre-hoy" class="checkbox-button">
                                <label for="filter-abre-hoy">Abre hoy</label>
                            </div>

                            <div>
                                <input type="number" id="filter-precio-max" placeholder="Precio máximo ($)">
                            </div>

                            </div>
                        </div>
                        <div>
                            <b>Cercanía</b>
                            <select id="filterDistanceKm" >
                                <option value="">-- Selecciona distancia --</option>
                                <option value="1">1 km</option>
                                <option value="5">5 km</option>
                                <option value="10">10 km</option>
                                <option value="50">50 km</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="filtersSummit">
                    <button type="button" id="filterSend" class="filtersSummit">Aplicar filtros</button>
                    <button type="button" id="filterErase" class="filtersSummit">Borrar filtros</button>
                </div>
            </div>

            <div id="viewMoreCard" class="viewMoreCard hidden">
                <div class="vm-card">
                    <div class="vm-header">
                        <h2 id="vm-nombre"></h2>
                        <img id="vm-image" src="" alt="Imagen del museo">
                        <img id="vm-image2" src="" alt="Imagen del museo">
                        <button id="vm-cerrar">✕</button>
                    </div>
                    <div class="vm-body" id="vm-body"></div>
                </div>
            </div>

            <!-- GRID DE MUSEOS -->
            <div id="museodes" class="scroll-smooth scrollbar-thin scrollbar-thumb-red-700 scrollbar-track-red-900 scrollbar-hide hover:scrollbar-default">
            </div>

            <div id="no-favorites-message" style="display: none;">
                <p>No hay lugares favoritos agregados aún.</p>
                <button onclick="window.location.href='/inicio'">Ir a agregar</button>
            </div>

            <div id="map" style="display: none;"></div>
        </main>
    </div>

    <script  src="js/Admin/musdesAdmin.js"></script> <!-- Tu archivo JavaScript que maneja la lógica -->
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/map.js"></script>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
</body>
</html>
