<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="LogIn">Inicio de Sesión | Ollin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/login.css">

    <script src="/ARCY-PRUEBAS/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css">
    <script defer src="js/i18n.js"></script>
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div class="main-wrapper">
        <div class="containerlanguages">
            <div class="lang-switcher">
                <label for="lang-select" data-i18n="label_select_lang">Idioma:</label>
                <select id="lang-select">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                    <option value="it">Italiano</option>
                    <option value="fr">Francés</option>
                </select>
            </div>
        </div>

        <div class="glass-card">
            <div class="brand-header">
                <img src="/assets/icons/Logo.PNG" alt="Logo" class="logo">
                <h1 data-i18n="heading">Accede a tu cuenta</h1>
            </div>

            <form id="login" novalidate>
                    <label for="email" class="static-label" data-i18n="email_placeholder">Correo Electrónico</label>
                    <input type="email" id="email" name="email"  required>

                    <label for="password" class="static-label" data-i18n="password_placeholder">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required>
                        <img src="/assets/icons/Boton ojoA.svg" alt="Mostrar" id="togglePassword" class="eye-icon">
                </div>
                    <a href="/recuperacion" id="recuperation" data-i18n="link_recover">¿Olvidaste tu contraseña?</a>

                <button type="submit" id="next" data-i18n="button_next">Iniciar sesión</button>

                <div class="registration-container">
                    <p data-i18n="text_no_account">¿No tienes una cuenta?</p>
                    <a href="/registrar" class="register-link" data-i18n="button_register">Regístrate ahora</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/Hide.js"></script>
</body>
</html>
