    .scrollbar-hide {
      scrollbar-width: none; /* Firefox */
    }

    .scrollbar-hide::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    /* Mostrar scrollbar solo al hacer hover */
    .hover\\:scrollbar-default:hover {
    scrollbar-width: auto; /* Firefox */
    }

    .hover\\:scrollbar-default:hover::-webkit-scrollbar {
    width: 8px;
    height: 8px;
    }

    .hover\\:scrollbar-default:hover::-webkit-scrollbar-thumb {
    background-color: rgba(0, 0, 0, 0.5);
    border-radius: 4px;
    }

    .hover\\:scrollbar-default:hover::-webkit-scrollbar-track {

        </div>

        <div class="container-modal-sidebar" id="modalSidebar">
            <div id="sidebar" class="sidebar">
                <div class="user">
                    <p data-i18n="greeting_hello">Hola, </p><b id="nombreUsuario"> NOMBRE </b> 
                </div>
                <div class="sidebar-text">
                    <a href="/museums" class="btn-sidebar"> 
                        <img src="./assets/icons/museum_icon_white.png" class="sidebar-img"> <span data-i18n="museums">Museos</span>
                    </a>
                    <a href="/aventuras_proximas" class="btn-sidebar"> 
                        <img src="./assets/icons/itinerarioIcono.png" class="sidebar-img"> <span data-i18n="visit_plans">Planes de Visita</span>
                    </a>
                    <a href="/MisFavoritos" class="btn-sidebar"> 
                        <img src="./assets/icons/favoritosBlancoRosa.png" class="sidebar-img"> <span data-i18n="favorite_museums">Museos favoritos</span>
                    </a>
                    <a href="/MisVisitados" class="btn-sidebar"> 
                        <img src="./assets/icons/checked.png" class="sidebar-img"> <span data-i18n="visited_museums">Museos Visitados</span>
                    </a>
                    
                </div>

                <div class="sidebar-text" style="margin-top: auto;">
                    <a href="/perfilTurista" class="btn-sidebar"> 
                        <img src="./assets/icons/engraneIcon.png" class="sidebar-img"> <span data-i18n="account">Cuenta</span>
                    </a>
                    <a href="#" class="btn-sidebar" id="cerrarSesion"> 
                        <img src="./assets/icons/cerrarIcono.png" class="sidebar-img"> <span data-i18n="logout">Cerrar Sesión </span>
                    </a>
                </div>
                <button type="button" id="closeBtn" class="closeBtn btn-icon" onclick="closeNav()">&times;</a>
            </div>
        </div>

    <main class="max-w-7xl mx-auto px-4 py-8 items-center scroll-smooth scrollbar-thin scrollbar-thumb-red-700 scrollbar-track-red-900 
                scrollbar-hide hover:scrollbar-default">
       
    <section class="flex flex-col gap-6 ">

        <div class="p-6">
            <div class="bg-mauve-900 rounded-xl overflow-hidden shadow-lg border border-mauve-400 p-4">
                <h1 class="titleAP" data-i18n="plans">Aventuras</h1>
            </div>
        </div>

            <div id="containerItinerarios"
                class="scroll-smooth scrollbar-thin scrollbar-thumb-red-700 scrollbar-track-red-900 scrollbar-hide hover:scrollbar-default">
                <!-- Las tarjetas de itinerarios se insertarán aquí -->
            </div>

    </section>
        <div id="no-favorites-message" style="display: none;">
            <p data-i18n="no_plan_museums">No hay planes de visita creados aún.</p>
        </div>
        <div class="create-adventure-container">
            <button data-i18n="create_plan_museums" class="create-adventure-link">Crear nuevo Plan de Visita</button>
        </div>
    </main>
    
    
            <!-- Resultados patrocinados -->
            <div class="container-results" id="containerSponsored">
                <hr class="hr-modal">
                <div class="title-results">
                    <h5 style="margin: 0">Patrocinados</h5>
                    <img src="assets/icons/promocionNegroIcon.png" width="16px" height="16px" style="margin-left: 4px;" alt="Patrocinados">
                </div>
                    
            </div>
            <!-- Resultados de API Places -->
            <div class="container-results" id="containerResultsPlaces">
                <hr class="hr-modal">
                <div class="title-results" style="margin-bottom: 0">
                    <h5 style="margin: 0">Resultados cerca de ti</h5>
                </div>
                <div id="results">
                    <!-- Aqui se insertan las casillas de autocompletado -->
                </div>
            </div>
        </div>
    </div>

<!-- Modal para Crear Nueva Aventura -->
<div class="modal fade" id="nuevaAventuraModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalLabel" data-i18n="create_plan_museums">Crear Nuevo Plan de Visita</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formNuevaAventura" method="post">
                    <div class="mb-3">
                        <label for="nombreItinerario" class="form-label" data-i18n="itinerary_name">Nombre del Itinerario</label>
                        <input type="text" class="form-control" id="nombreItinerario">
                    </div>
                    <button type="submit" class="btn btn-primary" data-i18n="create">Crear</button>
                </form>
            </div>
        </div>
    </div>
</div>
