<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventuras proximas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/inicio.css">
    <link rel="stylesheet" href="styles/styles_barra.css">
    <link rel="stylesheet" href="styles/Aventuras_proximas.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css">
</head>
<body>
    <header>
        <div class="navbar" >
            <span id="openBtn" class="btn-icon" onclick="openNav()" >&#9776;</span> 

            <img src="assets/icons/Logo.PNG" class="img-nav" alt="Logo" id="logoImage">

            <div class="containerlanguages">
                <!-- Selector de idioma -->
                <div class="lang-switcher">
                    <label for="lang-select" data-i18n="label_select_lang">Idioma:</label>
                    <select id="lang-select">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="it">Italiano</option>
                        <option value="fr">Frances</option>
                    </select>
                </div>
            </div>

            <button type="button" id="btnTriggerSB" class="btn-icon" onclick="window.location.href='/inicio'">
                <img src="assets/icons/regresar.png" alt="Buscar" class="img-nav">
            </button>
            
        </div>

        <div class="container-modal-sidebar" id="modalSidebar">
            <div id="sidebar" class="sidebar">
                <div class="user">
                    <p data-i18n="greeting_hello">Hola, </p><b id="nombreUsuario"> NOMBRE </b> 
                </div>
                <div class="sidebar-text">
                    <a href="/museums" class="btn-sidebar"> 
                        <img src="./assets/icons/museum_icon_white.png" class="sidebar-img"> <span data-i18n="museums">Museos</span>
                    </a>
                    <a href="/aventuras_proximas" class="btn-sidebar"> 
                        <img src="./assets/icons/itinerarioIcono.png" class="sidebar-img"> <span data-i18n="visit_plans">Planes de Visita</span>
                    </a>
                    <a href="/MisFavoritos" class="btn-sidebar"> 
                        <img src="./assets/icons/favoritosBlancoRosa.png" class="sidebar-img"> <span data-i18n="favorite_museums">Museos favoritos</span>
                    </a>
                    <a href="/MisVisitados" class="btn-sidebar"> 
                        <img src="./assets/icons/checked.png" class="sidebar-img"> <span data-i18n="visited_museums">Museos Visitados</span>
                    </a>
                    
                </div>

                <div class="sidebar-text" style="margin-top: auto;">
                    <a href="/perfilTurista" class="btn-sidebar"> 
                        <img src="./assets/icons/engraneIcon.png" class="sidebar-img"> <span data-i18n="account">Cuenta</span>
                    </a>
                    <a href="#" class="btn-sidebar" id="cerrarSesion"> 
                        <img src="./assets/icons/cerrarIcono.png" class="sidebar-img"> <span data-i18n="logout">Cerrar Sesión </span>
                    </a>
                </div>
                <button type="button" id="closeBtn" class="closeBtn btn-icon" onclick="closeNav()">&times;</a>
            </div>
        </div>   
    </header>
    <main> 
        <h1 class="titleAP">Aventuras proximas</h1>
        <div class="CPAP">
            <div class="cointainerAPcards">

                <div class="cardsAP">
                    <div class="cardHeader">
                        <span class="cardName">Nombre</span>
                        <span class="cardDate">Fecha</span>
                        <div style="display: flex; align-items: center;">
                        <img src="assets/icons/ubicacionIcon.png" alt="Ubicación" class="cardLocationIcon">
                        <span class="cardLocation">Cerca de: <span class="boldTextUbication">Ubicacion</span></span>
                        </div>
                    </div>
                    <div class="cardMain">
                        <div class="cardImages">
                            <img src="assets/icons/turismo.jpg" alt="Imagen grande" class="cardImageLarge">
                            <div class="cardImagesSmall">
                                <img src="assets/icons/turismo.jpg" alt="Imagen pequeña 1" class="cardImageSmall">
                                <img src="assets/icons/turismo.jpg" alt="Imagen pequeña 2" class="cardImageSmall">
                            </div>
                            <div class="cardImagesSmall">
                                <img src="assets/icons/turismo.jpg" alt="Imagen pequeña 3" class="cardImageSmall">
                                <img src="assets/icons/turismo.jpg" alt="Imagen pequeña 4" class="cardImageSmall">
                            </div>
                        </div>

                            <div class="cardResumen">Resumen
                                <p>Visitaste <p id="numberIte">x</p></p>
                                <p>Recorriste <p id="recoIte">x</p></p>
                                <p>Tu aventura duro <p id="timeIte">x</p></p>
                            </div>

                    </div>
                </div>

            </div>
        </div>
        <div class="create-adventure-container">
            <button class="create-adventure-link">Crear nueva aventura</button>
        </div>
        
    
    </main>
    
    <!-- Ventana modal de SearchBox -->
    <div class="container-modal" id="cModalSearchBox">
        <div class="content-modal">
            <!-- Barra de busqueda -->  
            <div class="container-search-box">         
                <!-- Boton regresar/cerrar -->
                <button type="button" id="btnClose" class="btn-icon" aria-label="Regresar">
                    <img src="assets/icons/flechaBack.png" alt="Regresar">
                </button>
                <!-- Input Barra de busqueda -->
                <input class="form-control-search-box" id="SearchBox" type="text" placeholder="Busca un lugar o categoría">
                <!-- Boton borrar busqueda -->
                <button type="button" id="btnClear" class="btn-icon" aria-label="Borrar"
                onclick="document.getElementById('SearchBox').value='' ">
                <img src="assets/icons/borrarIconNegro.png" width="30px" height="30px" alt="Borrar">
                </button>
            </div>
            <!-- Resultados patrocinados -->
            <div class="container-results" id="containerSponsored">
                <hr class="hr-modal">
                <div class="title-results">
                    <h5 style="margin: 0">Patrocinados</h5>
                    <img src="assets/icons/promocionNegroIcon.png" width="16px" height="16px" style="margin-left: 4px;" alt="Patrocinados">
                </div>
                <!-- Botones insertados -->
                <!-- Tendran esta estructura -->
                <!--
                    <button type="button" class="btn-sponsored">
                        <div class="container-info-sponsored">
                        <div class="" style="align-items: center;">
                            <img src="/assets/icons/promocionNegroIcon.png" width="32px" height="32px" style="margin:0px 4px;">
                        </div>

                        <div class="sponsored-place-info">
                            <div class="sponsored-name">Siete sopas</div>
                            <div class="sponsored-data">
                            <div class="sponsored-type">Restaurante |</div>
                            <div class="sponsored-direction">| Av. 56, San Rafael</div>
                            </div>
                            <div class="sponsored-schedules">
                            <div class="sponsored-open" style="color: green;">Abierto</div>
                            <div class="sponsored-hour">cierra a la 1 a.m.</div>
                            </div>
                        </div>
                        </div>
                    </button>
                    
                -->
                    
            </div>
            <!-- Resultados de API Places -->
            <div class="container-results" id="containerResultsPlaces">
                <hr class="hr-modal">
                <div class="title-results" style="margin-bottom: 0">
                    <h5 style="margin: 0">Resultados cerca de ti</h5>
                </div>
                <div id="results">
                    <!-- Aqui se insertan las casillas de autocompletado -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/toogle_modal.js"></script>
    <script src="js/expandir.js"></script>
    <script src="js/expandir-weekend.js"></script>
<!--    <script src="js/manipulationDates.js"></script> >>-->
    <script type="module" src="js/jquery-3.7.1.min.js"></script>
    <script type="module" src="js/places2.js"></script>
    <!-- <script type="module" src="js/places.js"></script> -->
    <script src="js/map.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
</body>
</html>
